# =============================================================================
# Fly.io config for API
# Deploy:  fly launch --copy-config --name enjoymilk-api --no-deploy
#          fly secrets set JWT_SECRET=... JWT_REFRESH_SECRET=... DATABASE_URL=...
#          fly deploy
# =============================================================================

app = "enjoymilk-api"
primary_region = "fra"   # Frankfurt — close to Jordan

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
